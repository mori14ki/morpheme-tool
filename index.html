<script type="text/babel">
const {useState,useRef,useMemo,useEffect,useCallback}=React;
const CDN="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2";

function patchXHR(){
  const Orig=window.XMLHttpRequest;
  window.XMLHttpRequest=class MockXHR{
    constructor(){this.readyState=0;this.status=0;this.response=null;this.responseType="";this.onload=null;this.onerror=null;this._url="";}
    open(_,url){this._url=url;}
    setRequestHeader(){}
    send(){
      const url=this._url.startsWith("http")?this._url:`${CDN}/dict/${this._url.split("/").pop()}`;
      fetch(url).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.arrayBuffer();})
        .then(buf=>{this.status=200;this.readyState=4;this.response=buf;this.onload?.({target:this});})
        .catch(e=>{this.status=0;this.readyState=4;this.onerror?.(e);});
    }
    abort(){}
    addEventListener(t,fn){if(t==="load")this.onload=fn;if(t==="error")this.onerror=fn;}
    removeEventListener(){}
    getAllResponseHeaders(){return"";}
    getResponseHeader(){return null;}
  };
  return Orig;
}

async function loadKuromoji(onProgress){
  if(window.__kuromojiTokenizer)return window.__kuromojiTokenizer;
  onProgress("kuromoji.js を読み込み中...",10);
  if(!window.kuromoji){
    const r=await fetch(`${CDN}/build/kuromoji.js`);
    if(!r.ok)throw new Error("取得失敗: HTTP "+r.status);
    const s=document.createElement("script");
    s.textContent=await r.text();
    document.head.appendChild(s);
    if(!window.kuromoji)throw new Error("読み込み失敗");
  }
  onProgress("辞書を構築中...",40);
  const orig=patchXHR();
  try{
    const tok=await new Promise((res,rej)=>window.kuromoji.builder({dicPath:"./"}).build((e,t)=>e?rej(new Error(String(e))):res(t)));
    window.__kuromojiTokenizer=tok;return tok;
  }finally{window.XMLHttpRequest=orig;}
}

const STOP_POS=new Set(["助詞","助動詞","記号","接続詞","感動詞","接頭詞"]);
const STOP_WORDS=new Set(["する","ある","いる","なる","れる","られる","ます","です","ない","たい","ため","こと","もの","これ","それ","あれ","ここ","そこ","など","的","各","全","毎","は","が","を","に","で","と","も","の","や","か","な","へ","ね","よ","し","て","から","まで","より","ので","という","として","について","において","による","にて","でも","けど","なの"]);
const GEO=new Set(["市","県","区","町","村","都","道","府"]);

function geoMerge(t){
  const o=[];
  for(let i=0;i<t.length;i++){
    if(i+1<t.length&&GEO.has(t[i+1])){o.push(t[i]+t[i+1]);i++;}
    else if(GEO.has(t[i])&&o.length>0)o[o.length-1]+=t[i];
    else o.push(t[i]);
  }
  return o;
}

function tokenize(tok,query,phrases){
  if(!tok||!query)return[];
  const q=query.replace(/[\s　]/g,"");if(!q)return[];
  const sorted=[...phrases].filter(p=>p).sort((a,b)=>b.length-a.length);
  let segs=[{p:false,t:q}];
  for(const ph of sorted){
    const next=[];
    for(const seg of segs){
      if(seg.p){next.push(seg);continue;}
      const parts=seg.t.split(ph);
      if(parts.length===1){next.push(seg);continue;}
      for(let i=0;i<parts.length;i++){
        if(parts[i])next.push({p:false,t:parts[i]});
        if(i<parts.length-1)next.push({p:true,t:ph});
      }
    }
    segs=next;
  }
  const res=[];
  for(const seg of segs){
    if(seg.p){if(seg.t.length>=2)res.push(seg.t);continue;}
    if(!seg.t)continue;
    try{
      for(const t of tok.tokenize(seg.t)){
        const s=t.surface_form;
        if(!s||s.length===1)continue;
        if(STOP_POS.has(t.pos)||STOP_WORDS.has(s))continue;
        if(/^[a-zA-Z0-9ａ-ｚＡ-Ｚ０-９]+$/.test(s))continue;
        const ub=(t.pos==="動詞"||t.pos==="形容詞")&&t.basic_form&&t.basic_form!=="*";
        res.push(ub?t.basic_form:s);
      }
    }catch(_){}
  }
  return geoMerge(res);
}

function getEP(params,results){
  const wc=results.filter(r=>r.conversions>0&&r.cpa!=null);
  const avgCPA=wc.length>0?Math.round(wc.reduce((s,r)=>s+r.cpa,0)/wc.length):0;
  const avgClicks=results.length>0?Math.round(results.reduce((s,r)=>s+r.clicks,0)/results.length):10;
  return{
    targetCPA:params.targetCPA?Number(params.targetCPA):avgCPA,
    minClicks:params.minClicks?Number(params.minClicks):Math.max(avgClicks,5),
    minCVT:params.minCVT?Number(params.minCVT):3,
    cpaMult:params.cpaMult?Number(params.cpaMult):2,
    usingAvg:{targetCPA:!params.targetCPA},avgCPA,
  };
}

function classify(row,ep){
  const{targetCPA,minClicks,minCVT,cpaMult}=ep;
  if(targetCPA===0)return"neutral";
  if(row.conversions===0&&row.clicks>=minClicks)return"red";
  if(row.cpa!=null&&row.cpa>targetCPA*cpaMult&&row.conversions<minCVT)return"red";
  if(row.cpa!=null&&row.cpa>targetCPA&&row.conversions>=minCVT)return"yellow";
  if(row.conversions>0&&row.conversions<3&&row.cvr>5)return"yellow";
  if(row.conversions>0&&row.cpa!=null&&row.cpa<=targetCPA)return"green";
  return"neutral";
}

const SL={green:"優良",yellow:"要観察",red:"除外候補",neutral:"—"};
const SC={green:"#22c55e",yellow:"#f59e0b",red:"#ef4444",neutral:"#475569"};

const AD=[
  {key:"query",pats:["検索語句","search term","query"]},
  {key:"impressions",pats:["表示回数","impression","impr"]},
  {key:"clicks",pats:["クリック数","clicks"]},
  {key:"conversions",pats:["コンバージョン数","コンバージョン","conversions"]},
  {key:"cost",pats:["費用","cost","spend"]},
];
const CL={query:"検索語句",impressions:"表示回数",clicks:"クリック数",conversions:"コンバージョン数",cost:"費用（円）"};

function autoDetect(hdrs){
  const m={query:"",impressions:"",clicks:"",conversions:"",cost:""};
  for(const{key,pats}of AD){
    for(const h of hdrs){
      const lo=h.toLowerCase();
      if(!pats.some(p=>lo.includes(p.toLowerCase())))continue;
      if(key==="conversions"&&lo.match(/率|値|rate|value\/conv/i))continue;
      if(key==="clicks"&&lo.match(/率|rate|ctr/i))continue;
      m[key]=h;break;
    }
  }
  return m;
}

function pn(v){if(!v&&v!==0)return 0;return parseFloat(String(v).replace(/[,，￥¥\s]/g,"").replace(/[^0-9.-]/g,""))||0;}
function fmt(v,d=0){if(v==null||isNaN(v))return"—";return v.toLocaleString("ja-JP",{minimumFractionDigits:d,maximumFractionDigits:d});}
function no(v,d=0){if(v==null||isNaN(v))return"";return Number(v.toFixed(d));}

// ─── design tokens ───
const C={
  bg:"#0a0d14",surface:"#111827",card:"#161d2e",border:"#1e2d4a",
  accent:"#6366f1",accentHover:"#4f46e5",
  text:"#e2e8f0",muted:"#64748b",dim:"#374151",
};
const inp={padding:"9px 14px",borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,width:"100%",boxSizing:"border-box",background:C.surface,color:C.text,outline:"none"};
const card={background:C.card,borderRadius:16,padding:"1.5rem",border:`1px solid ${C.border}`,marginBottom:"1rem"};

function Btn({variant="ghost",sm,onClick,disabled,children,style}){
  const base={border:"none",borderRadius:10,cursor:disabled?"not-allowed":"pointer",fontWeight:600,
    padding:sm?"6px 14px":"10px 22px",fontSize:sm?12:13,transition:"all 0.15s",opacity:disabled?0.5:1,...style};
  const v={
    primary:{...base,background:`linear-gradient(135deg,${C.accent},#8b5cf6)`,color:"#fff",boxShadow:"0 4px 20px rgba(99,102,241,0.35)"},
    ghost:{...base,background:"transparent",color:C.muted,border:`1px solid ${C.border}`},
    danger:{...base,background:"transparent",color:"#ef4444",border:"1px solid #ef444430"},
  };
  return<button style={v[variant]||v.ghost} onClick={onClick} disabled={disabled}>{children}</button>;
}

function Badge({color,children}){
  return<span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:99,fontSize:11,fontWeight:600,background:color+"20",color}}>{children}</span>;
}

const COLS=[
  {key:"status",label:"判定",align:"left"},
  {key:"morpheme",label:"形態素",align:"left"},
  {key:"queryCount",label:"クエリ数",align:"right"},
  {key:"impressions",label:"表示回数",align:"right"},
  {key:"clicks",label:"クリック",align:"right"},
  {key:"ctr",label:"CTR",align:"right"},
  {key:"conversions",label:"CV数",align:"right"},
  {key:"cvr",label:"CVR",align:"right"},
  {key:"cpa",label:"CPA",align:"right"},
  {key:"cost",label:"費用",align:"right"},
];

function Cell({col,row}){
  switch(col.key){
    case"status":{
      if(row.status==="neutral")return<span style={{color:C.dim}}>—</span>;
      const c=SC[row.status];
      return<Badge color={c}><span style={{width:5,height:5,borderRadius:"50%",background:c,display:"inline-block"}}/>{SL[row.status]}</Badge>;
    }
    case"morpheme":return<span style={{fontWeight:700,color:"#f1f5f9"}}>{row.morpheme}</span>;
    case"queryCount":return<span style={{color:C.muted}}>{fmt(row.queryCount)}</span>;
    case"impressions":return<span style={{color:C.muted}}>{fmt(row.impressions)}</span>;
    case"clicks":return<span>{fmt(row.clicks)}</span>;
    case"ctr":return<span style={{color:C.muted}}>{fmt(row.ctr,2)}%</span>;
    case"conversions":return<span style={{color:row.conversions>0?"#22c55e":C.muted,fontWeight:row.conversions>0?700:400}}>{fmt(row.conversions,1)}</span>;
    case"cvr":return<span>{fmt(row.cvr,2)}%</span>;
    case"cpa":return row.cpa!=null?<span style={{color:row.status==="green"?"#22c55e":row.status==="red"?"#ef4444":C.text,fontWeight:600}}>{"¥"+fmt(row.cpa)}</span>:<span style={{color:C.dim}}>—</span>;
    case"cost":return<span style={{color:C.muted}}>{"¥"+fmt(row.cost)}</span>;
    default:return null;
  }
}

function App(){
  const[step,setStep]=useState("upload");
  const[ks,setKs]=useState({status:"idle",msg:"",pct:0,err:""});
  const tokRef=useRef(null);
  const[csvData,setCsvData]=useState([]);
  const[headers,setHeaders]=useState([]);
  const[colMap,setColMap]=useState({query:"",impressions:"",clicks:"",conversions:"",cost:""});
  const[phraseText,setPhraseText]=useState("");
  const[expand,setExpand]=useState(false);
  const[showPanel,setShowPanel]=useState(false);
  const[params,setParams]=useState({targetCPA:"",minClicks:"",minCVT:"",cpaMult:"2"});
  const sp=(k,v)=>setParams(p=>({...p,[k]:v}));
  const aggRef=useRef({});
  const[results,setResults]=useState([]);
  const[progress,setProgress]=useState(0);
  const[sortKey,setSortKey]=useState("conversions");
  const[sortDir,setSortDir]=useState("desc");
  const[minQ,setMinQ]=useState(1);
  const[filter,setFilter]=useState("");
  const[sfil,setSfil]=useState("all");
  const[error,setError]=useState("");
  const[drag,setDrag]=useState(false);
  const fileRef=useRef();

  useEffect(()=>{
    setKs({status:"loading",msg:"",pct:0,err:""});
    loadKuromoji((msg,pct)=>setKs(s=>({...s,msg,pct})))
      .then(t=>{tokRef.current=t;setKs({status:"ready",msg:"",pct:100,err:""});})
      .catch(e=>setKs({status:"error",msg:"",pct:0,err:e.message}));
  },[]);

  const retry=()=>{
    window.__kuromojiTokenizer=null;
    setKs({status:"loading",msg:"",pct:0,err:""});
    loadKuromoji((msg,pct)=>setKs(s=>({...s,msg,pct})))
      .then(t=>{tokRef.current=t;setKs({status:"ready",msg:"",pct:100,err:""});})
      .catch(e=>setKs({status:"error",msg:"",pct:0,err:e.message}));
  };

  const phrases=useMemo(()=>phraseText.split("\n").map(s=>s.trim()).filter(Boolean),[phraseText]);
  const ep=useMemo(()=>getEP(params,results),[params,results]);

  const handleFile=(file)=>{
    if(!file)return;setError("");
    Papa.parse(file,{header:true,skipEmptyLines:true,
      complete:res=>{
        const data=res.data.filter(row=>!String(Object.values(row)[0]||"").match(/^(合計|小計|Total|Grand Total|--)/i));
        if(!data.length){setError("データが見つかりません。");return;}
        const hdrs=Object.keys(data[0]);
        setCsvData(data);setHeaders(hdrs);setColMap(autoDetect(hdrs));setStep("mapping");
      },
      error:e=>setError("CSV解析エラー: "+e.message),
    });
  };

  function runAnalysis(tok,agg,phr,doExp){
    const qs=Object.keys(agg);
    const pc={};if(doExp)for(const p of phr)pc[p]=tokenize(tok,p,[]);
    const mm={};
    function add(m,q,d){
      if(!mm[m])mm[m]={morpheme:m,qs:{},imp:0,clicks:0,conv:0,cost:0};
      mm[m].qs[q]=true;mm[m].imp+=d.imp;mm[m].clicks+=d.clicks;mm[m].conv+=d.conv;mm[m].cost+=d.cost;
    }
    const CHUNK=200;let idx=0;
    function chunk(){
      const end=Math.min(idx+CHUNK,qs.length);
      for(let i=idx;i<end;i++){
        const q=qs[i],d=agg[q];
        const toks=tokenize(tok,q,phr);
        for(const m of toks)add(m,q,d);
        if(doExp)for(const m of toks){const c=pc[m];if(c)for(const x of c)add(x,q,d);}
      }
      idx=end;setProgress(Math.round(idx/qs.length*100));
      if(idx<qs.length){setTimeout(chunk,0);return;}
      setResults(Object.values(mm).map(({morpheme,qs,imp,clicks,conv,cost})=>({
        morpheme,queryCount:Object.keys(qs).length,
        impressions:Math.round(imp),clicks:Math.round(clicks),
        conversions:Math.round(conv*10)/10,cost:Math.round(cost),
        ctr:imp>0?clicks/imp*100:0,cvr:clicks>0?conv/clicks*100:0,cpa:conv>0?cost/conv:null,
      })));
      setStep("results");
    }
    setTimeout(chunk,0);
  }

  const startAnalysis=()=>{
    if(!colMap.query){setError("検索語句のカラムを選択してください");return;}
    if(!tokRef.current){setError("辞書の読み込みが完了していません");return;}
    setError("");setProgress(0);setStep("analyzing");
    const agg={};
    for(const row of csvData){
      const q=row[colMap.query];if(!q)continue;
      if(!agg[q])agg[q]={imp:0,clicks:0,conv:0,cost:0};
      agg[q].imp+=pn(row[colMap.impressions]);agg[q].clicks+=pn(row[colMap.clicks]);
      agg[q].conv+=pn(row[colMap.conversions]);agg[q].cost+=pn(row[colMap.cost]);
    }
    if(!Object.keys(agg).length){setError("検索語句が見つかりません");setStep("mapping");return;}
    aggRef.current=agg;runAnalysis(tokRef.current,agg,phrases,expand);
  };

  const rerun=(ph,ex)=>{
    if(!tokRef.current||!Object.keys(aggRef.current).length)return;
    setProgress(0);setStep("analyzing");
    runAnalysis(tokRef.current,aggRef.current,ph,ex);
  };

  const handleSort=k=>{if(sortKey===k)setSortDir(d=>d==="desc"?"asc":"desc");else{setSortKey(k);setSortDir("desc");}};

  const ws=useMemo(()=>results.map(r=>({...r,status:classify(r,ep)})),[results,ep]);

  const sorted=useMemo(()=>
    ws.filter(r=>r.queryCount>=minQ&&(!filter||r.morpheme.includes(filter))&&(sfil==="all"||r.status===sfil))
      .sort((a,b)=>{const av=a[sortKey]??(sortDir==="desc"?-1e9:1e9),bv=b[sortKey]??(sortDir==="desc"?-1e9:1e9);return sortDir==="desc"?bv-av:av-bv;}),
  [ws,sortKey,sortDir,minQ,filter,sfil]);

  const dlCSV=useCallback(()=>{
    try{
      const h=["判定","形態素","クエリ数","表示回数","クリック数","CTR(%)","CV数","CVR(%)","CPA(円)","費用(円)"];
      const rows=sorted.map(r=>[(SL[r.status]||""),r.morpheme,r.queryCount,r.impressions,r.clicks,no(r.ctr,2),no(r.conversions,1),no(r.cvr,2),r.cpa!=null?Math.round(r.cpa):"",r.cost]);
      const csv=[h,...rows].map(r=>r.map(c=>{const s=String(c??"");return s.includes(",")?`"${s}"`:s;}).join(",")).join("\n");
      const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download="形態素解析レポート.csv";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    }catch(e){alert("エラー: "+e.message);}
  },[sorted]);

  function KsBadge(){
    if(ks.status==="ready")return<Badge color="#22c55e"><span style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/>辞書読込完了</Badge>;
    if(ks.status==="loading")return<Badge color="#f59e0b"><span style={{width:6,height:6,borderRadius:"50%",background:"#f59e0b",display:"inline-block"}}/>準備中...</Badge>;
    if(ks.status==="error")return<Btn variant="danger" sm onClick={retry}>再試行</Btn>;
    return null;
  }

  function Header({sub}){
    return(
      <div style={{background:"#0d1120",borderBottom:`1px solid ${C.border}`,padding:"1rem 2rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:12,background:`linear-gradient(135deg,${C.accent},#8b5cf6)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"0 4px 16px rgba(99,102,241,0.4)"}}>🔍</div>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:"#f1f5f9",letterSpacing:"-0.3px"}}>形態素解析ツール</div>
            {sub&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>{sub}</div>}
          </div>
        </div>
        <KsBadge/>
      </div>
    );
  }

  function PhrasePanel(){
    return(
      <div style={{position:"fixed",top:0,right:0,bottom:0,width:320,background:"#0d1120",boxShadow:"-8px 0 40px rgba(0,0,0,0.6)",zIndex:900,display:"flex",flexDirection:"column",borderLeft:`1px solid ${C.border}`}}>
        <div style={{padding:"1.2rem 1.5rem",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontWeight:700,fontSize:14,color:"#f1f5f9"}}>📖 フレーズルール</div>
          <Btn variant="ghost" sm onClick={()=>setShowPanel(false)}>✕</Btn>
        </div>
        <div style={{flex:1,padding:"1rem",display:"flex",flexDirection:"column",gap:12,overflow:"auto"}}>
          <p style={{fontSize:11,color:C.muted,lineHeight:1.7}}>1行1フレーズ。分割させたくない語句を登録すると解析精度が上がります。</p>
          <textarea value={phraseText}
            onChange={e=>{const v=e.target.value;setPhraseText(v);rerun(v.split("\n").map(s=>s.trim()).filter(Boolean),expand);}}
            placeholder={"通信制高校\n通信制\n高等学校"}
            style={{...inp,flex:1,minHeight:200,resize:"none",lineHeight:1.8}}/>
          <label style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer",padding:"12px",background:C.surface,borderRadius:10,border:`1px solid ${C.border}`}}>
            <input type="checkbox" checked={expand} style={{marginTop:3,accentColor:C.accent}} onChange={e=>{setExpand(e.target.checked);rerun(phrases,e.target.checked);}}/>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>構成要素に重複カウント</div>
              <div style={{fontSize:11,color:C.muted,marginTop:3}}>「通信制高校」→「通信制」「高校」にも集計</div>
            </div>
          </label>
          <div style={{fontSize:11,color:C.muted}}>{phrases.length}件登録中</div>
        </div>
      </div>
    );
  }

  // ══ UPLOAD ══
  if(step==="upload")return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Header/>
      <div style={{maxWidth:520,margin:"0 auto",padding:"4rem 1.5rem"}}>
        <div style={{textAlign:"center",marginBottom:"2.5rem"}}>
          <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:14}}>Google Ads · 形態素分析</div>
          <h1 style={{fontSize:30,fontWeight:800,color:"#f1f5f9",lineHeight:1.25,letterSpacing:"-0.5px",marginBottom:14}}>検索語句の本質的な<br/>ニーズを可視化する</h1>
          <p style={{fontSize:13,color:C.muted,lineHeight:1.8}}>検索語句レポートCSVをアップロードするだけ。<br/>形態素ごとのCV・CPA・CVRを自動集計します。</p>
        </div>
        <div
          onDragOver={e=>{e.preventDefault();setDrag(true);}}
          onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f&&f.name.endsWith(".csv"))handleFile(f);else setError("CSVファイルを選択してください");}}
          onClick={()=>fileRef.current.click()}
          style={{border:`2px dashed ${drag?C.accent:C.border}`,borderRadius:20,padding:"3.5rem 2rem",textAlign:"center",cursor:"pointer",background:drag?C.accent+"0d":C.card,transition:"all 0.2s",boxShadow:drag?`0 0 40px ${C.accent}22`:"none"}}>
          <div style={{fontSize:44,marginBottom:14}}>📂</div>
          <div style={{fontWeight:700,fontSize:15,color:"#f1f5f9",marginBottom:8}}>CSVをドロップ / クリックして選択</div>
          <div style={{fontSize:12,color:C.muted}}>Google広告 検索語句レポート（CSV形式）</div>
          <input ref={fileRef} type="file" accept=".csv" onChange={e=>handleFile(e.target.files[0])} style={{display:"none"}}/>
        </div>
        {error&&<div style={{marginTop:14,padding:"10px 16px",background:"#ef444415",border:"1px solid #ef444430",borderRadius:12,fontSize:13,color:"#ef4444"}}>⚠️ {error}</div>}
      </div>
    </div>
  );

  // ══ MAPPING ══
  if(step==="mapping"){
    const uniq=new Set(csvData.map(r=>r[colMap.query]).filter(Boolean)).size;
    return(
      <div style={{minHeight:"100vh",background:C.bg}}>
        <Header sub="カラム設定"/>
        <div style={{maxWidth:660,margin:"0 auto",padding:"2rem 1.5rem"}}>
          <div style={{display:"flex",gap:10,marginBottom:"1.5rem"}}>
            {[["📄",csvData.length.toLocaleString(),"行"],["🔑",uniq.toLocaleString(),"ユニーク"],["⚡","数秒","推定"]].map(([icon,val,label])=>(
              <div key={label} style={{flex:1,...card,padding:"1.2rem",textAlign:"center",marginBottom:0}}>
                <div style={{fontSize:22,marginBottom:6}}>{icon}</div>
                <div style={{fontSize:20,fontWeight:800,color:"#f1f5f9"}}>{val}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:3}}>{label}</div>
              </div>
            ))}
          </div>

          <div style={card}>
            <div style={{fontWeight:700,fontSize:14,color:"#f1f5f9",marginBottom:18}}>カラムマッピング</div>
            {Object.keys(colMap).map(key=>(
              <div key={key} style={{marginBottom:14}}>
                <label style={{fontSize:11,fontWeight:600,color:C.muted,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.05em"}}>
                  {CL[key]}{key==="query"&&<span style={{color:"#ef4444",marginLeft:5}}>*必須</span>}
                </label>
                <select value={colMap[key]} onChange={e=>{const v=e.target.value;setColMap(p=>({...p,[key]:v}));}} style={inp}>
                  <option value="">— 選択してください —</option>
                  {headers.map(h=><option key={h} value={h}>{h}</option>)}
                </select>
              </div>
            ))}
            {error&&<div style={{padding:"8px 12px",background:"#ef444415",borderRadius:8,fontSize:12,color:"#ef4444",marginTop:8}}>⚠️ {error}</div>}
            <div style={{display:"flex",gap:10,marginTop:22}}>
              <Btn variant="ghost" onClick={()=>setStep("upload")}>← 戻る</Btn>
              <Btn variant="primary" onClick={startAnalysis}>分析開始 →</Btn>
            </div>
          </div>

          <div style={card}>
            <div style={{fontWeight:700,fontSize:14,color:"#f1f5f9",marginBottom:6}}>⚙️ 判定パラメータ</div>
            <div style={{fontSize:11,color:C.muted,marginBottom:16}}>未入力の場合はレポートの平均値から自動算出します</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[{k:"targetCPA",l:"目標CPA（円）",ph:"未入力 → 平均CPA"},{k:"minClicks",l:"CV0除外クリック閾値",ph:"未入力 → 平均クリック数"},{k:"minCVT",l:"高CPA許容の最低CV数",ph:"未入力 → 3"},{k:"cpaMult",l:"除外判定のCPA倍率",ph:"未入力 → 2"}].map(({k,l,ph})=>(
                <div key={k}>
                  <label style={{fontSize:11,fontWeight:600,color:C.muted,display:"block",marginBottom:7}}>{l}</label>
                  <input type="number" value={params[k]} onChange={e=>sp(k,e.target.value)} placeholder={ph} style={inp}/>
                </div>
              ))}
            </div>
            <div style={{marginTop:14,padding:"12px 16px",background:C.accent+"0d",borderRadius:12,fontSize:11,color:"#818cf8",lineHeight:1.9}}>
              🟢 CPA目標以内でCV有り　🟡 CPAが目標超えだがCV {params.minCVT||3} 件以上　🔴 CV0でクリック閾値以上 / CPA目標の{params.cpaMult||2}倍超でCV少
            </div>
          </div>

          <div style={card}>
            <div style={{fontWeight:700,fontSize:14,color:"#f1f5f9",marginBottom:6}}>📖 フレーズルール <span style={{fontSize:11,color:C.muted,fontWeight:400}}>（任意）</span></div>
            <div style={{fontSize:11,color:C.muted,marginBottom:12}}>1行1フレーズ。分割させたくない語句を事前登録。市・県・区などは自動結合。</div>
            <textarea value={phraseText} onChange={e=>setPhraseText(e.target.value)} placeholder={"通信制高校\n通信制\n高等学校"} rows={4} style={{...inp,resize:"vertical",lineHeight:1.8}}/>
            <label style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer",marginTop:12,padding:"12px",background:C.surface,borderRadius:12,border:`1px solid ${C.border}`}}>
              <input type="checkbox" checked={expand} onChange={e=>setExpand(e.target.checked)} style={{marginTop:3,accentColor:C.accent}}/>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>フレーズの構成要素にも重複カウントする</div>
                <div style={{fontSize:11,color:C.muted,marginTop:3}}>OFF：「通信制高校」クエリは「通信制高校」のみ集計　ON：「通信制」「高校」にも重複集計</div>
              </div>
            </label>
          </div>
        </div>
      </div>
    );
  }

  // ══ ANALYZING ══
  if(step==="analyzing")return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",maxWidth:380}}>
        <div style={{width:72,height:72,borderRadius:20,background:`linear-gradient(135deg,${C.accent},#8b5cf6)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 24px",boxShadow:`0 8px 32px ${C.accent}44`}}>⚙️</div>
        <h2 style={{fontSize:24,fontWeight:800,color:"#f1f5f9",marginBottom:8}}>形態素解析中...</h2>
        <p style={{fontSize:13,color:C.muted,marginBottom:28}}>kuromoji.js でローカル処理中（通信なし）</p>
        <div style={{background:C.card,borderRadius:99,height:6,overflow:"hidden",marginBottom:12,border:`1px solid ${C.border}`}}>
          <div style={{background:`linear-gradient(90deg,${C.accent},#8b5cf6)`,height:6,width:progress+"%",borderRadius:99,transition:"width 0.3s ease",boxShadow:`0 0 12px ${C.accent}88`}}/>
        </div>
        <div style={{fontSize:28,fontWeight:800,color:C.accent}}>{progress}%</div>
      </div>
    </div>
  );

  // ══ RESULTS ══
  const topCV=[...ws].filter(r=>r.conversions>0).sort((a,b)=>b.conversions-a.conversions).slice(0,10);
  const topRed=[...ws].map(r=>({...r,deficit:r.cost-(r.conversions*ep.targetCPA)})).filter(r=>r.deficit>0).sort((a,b)=>b.deficit-a.deficit).slice(0,10);
  const uCount=new Set(csvData.map(r=>r[colMap.query]).filter(Boolean)).size;
  const cnt={green:ws.filter(r=>r.status==="green").length,yellow:ws.filter(r=>r.status==="yellow").length,red:ws.filter(r=>r.status==="red").length};

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Header sub={`${results.length}個の形態素 · ${uCount.toLocaleString()}ユニーククエリ · ${csvData.length.toLocaleString()}行`}/>
      {showPanel&&<PhrasePanel/>}
      <div style={{maxWidth:1200,margin:"0 auto",padding:"1.5rem 1.5rem 3rem"}}>

        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <Btn variant="ghost" sm onClick={()=>setShowPanel(v=>!v)} style={{position:"relative"}}>
            📖 フレーズルール
            {phrases.length>0&&<span style={{position:"absolute",top:-7,right:-7,background:C.accent,color:"#fff",borderRadius:99,fontSize:10,padding:"1px 6px",fontWeight:700}}>{phrases.length}</span>}
          </Btn>
          <Btn variant="ghost" sm onClick={dlCSV}>⬇ CSVエクスポート</Btn>
          <Btn variant="ghost" sm onClick={()=>{setStep("upload");setResults([]);aggRef.current={};}}>やり直す</Btn>
        </div>

        {/* サマリー */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
          {[
            {l:"優良",v:cnt.green,c:"#22c55e",sf:"green"},
            {l:"要観察",v:cnt.yellow,c:"#f59e0b",sf:"yellow"},
            {l:"除外候補",v:cnt.red,c:"#ef4444",sf:"red"},
            {l:"目標CPA",v:ep.usingAvg.targetCPA?"¥"+fmt(ep.targetCPA)+" (平均)":"¥"+fmt(ep.targetCPA),c:C.accent,sf:"_"},
          ].map(({l,v,c,sf})=>(
            <div key={l} onClick={()=>sf!=="_"&&setSfil(sfil===sf?"all":sf)}
              style={{...card,marginBottom:0,cursor:sf!=="_"?"pointer":"default",border:`1px solid ${sfil===sf&&sf!=="_"?c+"55":C.border}`,background:sfil===sf&&sf!=="_"?c+"0d":C.card,transition:"all 0.15s"}}>
              <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase",marginBottom:10}}>{l}</div>
              <div style={{fontSize:28,fontWeight:800,color:c,letterSpacing:"-0.5px"}}>{typeof v==="number"?v.toLocaleString():v}</div>
              {sf!=="_"&&<div style={{fontSize:10,color:C.dim,marginTop:8}}>{sfil===sf?"クリックで解除":"クリックで絞り込み"}</div>}
            </div>
          ))}
        </div>

        {/* TOP カード */}
        {topCV.length>0&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <div style={{...card,marginBottom:0}}>
              <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
                <span>🏆</span>CV数 TOP10
              </div>
              {topCV.map((r,i)=>(
                <div key={r.morpheme} style={{display:"flex",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.border}50`,gap:8}}>
                  <span style={{fontSize:11,color:C.dim,width:20,flexShrink:0,fontWeight:600}}>{i+1}</span>
                  <span style={{fontWeight:700,color:"#f1f5f9",flex:1,fontSize:13}}>{r.morpheme}</span>
                  <span style={{fontSize:11,color:C.muted}}>CV {fmt(r.conversions,1)}</span>
                  <span style={{fontSize:12,color:r.status==="green"?"#22c55e":"#94a3b8",fontWeight:600}}>{r.cpa!=null?"¥"+fmt(r.cpa):"—"}</span>
                </div>
              ))}
            </div>
            <div style={{...card,marginBottom:0}}>
              <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
                <span>🔴</span>除外候補 TOP10（赤字見込み大）
              </div>
              <div style={{fontSize:10,color:C.dim,marginBottom:14}}>赤字 = 費用 − CV × 目標CPA（¥{fmt(ep.targetCPA)}）</div>
              {topRed.map((r,i)=>(
                <div key={r.morpheme} style={{display:"flex",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.border}50`,gap:8}}>
                  <span style={{fontSize:11,color:C.dim,width:20,flexShrink:0,fontWeight:600}}>{i+1}</span>
                  <span style={{fontWeight:700,color:"#f1f5f9",flex:1,fontSize:13}}>{r.morpheme}</span>
                  <span style={{fontSize:11,color:C.muted}}>費用 ¥{fmt(r.cost)}</span>
                  <span style={{fontSize:12,color:"#ef4444",fontWeight:700}}>−¥{fmt(r.deficit)}</span>
                </div>
              ))}
              {topRed.length===0&&<div style={{fontSize:12,color:C.muted,textAlign:"center",padding:"1.5rem 0"}}>除外候補なし</div>}
            </div>
          </div>
        )}

        {/* フィルター */}
        <div style={{...card,padding:"0.9rem 1.2rem",display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
          <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="🔍 形態素を検索..." style={{...inp,width:210,padding:"7px 14px"}}/>
          <label style={{fontSize:12,color:C.muted,display:"flex",alignItems:"center",gap:8}}>
            最小クエリ数
            <input type="number" value={minQ} min={1} onChange={e=>setMinQ(Number(e.target.value)||1)} style={{...inp,width:64,padding:"7px 10px"}}/>
          </label>
          <span style={{fontSize:12,color:C.dim,marginLeft:"auto"}}>{sorted.length} 件</span>
        </div>

        {/* テーブル */}
        <div style={{...card,padding:0,overflow:"hidden",marginBottom:0}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
              <thead>
                <tr style={{background:"#0d1120"}}>
                  {COLS.map(col=>(
                    <th key={col.key}
                      onClick={()=>!["status","morpheme"].includes(col.key)&&handleSort(col.key)}
                      style={{padding:"11px 16px",fontSize:10,fontWeight:700,color:C.muted,textAlign:col.align,whiteSpace:"nowrap",userSelect:"none",cursor:!["status","morpheme"].includes(col.key)?"pointer":"default",borderBottom:`1px solid ${C.border}`,letterSpacing:"0.08em",textTransform:"uppercase"}}>
                      {col.label}
                      {!["status","morpheme"].includes(col.key)&&(
                        sortKey===col.key
                          ?<span style={{marginLeft:4,color:C.accent}}>{sortDir==="desc"?"↓":"↑"}</span>
                          :<span style={{marginLeft:4,color:C.dim}}>↕</span>
                      )}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sorted.length===0
                  ?<tr><td colSpan={COLS.length} style={{padding:"3rem",textAlign:"center",color:C.muted,fontSize:13}}>データがありません</td></tr>
                  :sorted.map((row)=>(
                    <tr key={row.morpheme} className="row" style={{borderBottom:`1px solid ${C.border}30`}}>
                      {COLS.map(col=>(
                        <td key={col.key} style={{padding:"11px 16px",fontSize:13,textAlign:col.align,color:C.muted}}>
                          <Cell col={col} row={row}/>
                        </td>
                      ))}
                    </tr>
                  ))
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
